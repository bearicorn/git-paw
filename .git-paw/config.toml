# git-paw configuration for this repository.
# All features are enabled. Field documentation lives in the configuration
# reference; comments here only note this repo's specific choices.

default_cli = "claude-oss"
mouse = true
default_spec_cli = "claude-oss"
branch_prefix = "feat/"

[specs]
type = "openspec"
dir = "openspec/changes"

[logging]
enabled = true

[broker]
enabled = true
port = 9119
bind = "127.0.0.1"

[dashboard]
show_message_log = true

[supervisor]
enabled = true
cli = "claude-oss"

# Five-gate verification commands — this repo's just recipes / toolchain.
test_command           = "just verify"
lint_command           = "just lint"
build_command          = "cargo build"
doc_build_command      = "just docs"
spec_validate_command  = "openspec validate {{CHANGE_ID}} --strict"
fmt_check_command      = "cargo fmt --check"
security_audit_command = "just audit"

agent_approval = "auto"
learnings = true

[supervisor.learnings_config]
flush_interval_seconds = 60

# Dev-command allowlist. git-paw is a Rust + just + mdBook + OpenSpec repo:
# the curated `rust` stack plus its remaining toolchain verbs.
[supervisor.common_dev_allowlist]
enabled = true
stacks = ["rust"]
extra = ["openspec", "just", "mdbook build"]

[supervisor.auto_approve]
enabled = true
approval_level = "safe"
stall_threshold_seconds = 30
safe_commands = []

[supervisor.conflict]
window_seconds = 120
warn_on_intent_overlap = true
escalate_on_violation = true

# Governance docs the supervisor reads during spec audit. Only paths that
# exist in this repo are set; the rest stay commented.
[governance]
dod = "AGENTS.md"
readme = "README.md"
docs = "docs/src"
# adr           = "docs/adr"
# test_strategy = "docs/test-strategy.md"
# security      = "docs/security-checklist.md"
# constitution  = ".specify/memory/constitution.md"

# claude-oss: a custom (non-bundled) CLI used by this repository.
[clis.claude-oss]
command = "claude-oss"
display_name = "Claude (OSS)"
settings_path = "~/.claude-oss/settings.json"


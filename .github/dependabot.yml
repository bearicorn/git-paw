version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: "build(deps):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    ignore:
      # release.yml is auto-generated by cargo-dist — these action versions
      # are pinned by dist and must not be bumped independently
      - dependency-name: "actions/download-artifact"
      - dependency-name: "actions/upload-artifact"
      - dependency-name: "actions/checkout"
    commit-message:
      prefix: "ci(deps):"

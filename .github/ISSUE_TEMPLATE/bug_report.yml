name: Bug Report
description: Report a bug in git-paw
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `git paw start --cli claude --branches feat/auth`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: git-paw Version
      description: Output of `git-paw --version`
      placeholder: "git-paw 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (ARM)
        - macOS (x86)
        - Linux (x86_64)
        - Linux (ARM64)
        - Windows (WSL)
    validations:
      required: true

  - type: input
    id: tmux-version
    attributes:
      label: tmux Version
      description: Output of `tmux -V`
      placeholder: "tmux 3.4"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.

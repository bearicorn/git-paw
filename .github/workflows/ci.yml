name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger: re-run the pipeline (and the docs/Pages deploy) on demand
  # with a fresh run id. This is the recovery lever for the upstream
  # upload-pages-artifact retry-dup transient (actions/upload-pages-artifact#97),
  # where a finalize-timeout retry uploads a second `github-pages` artifact and
  # deploy-pages aborts with "Multiple artifacts named github-pages". A new run
  # id starts with zero artifacts, so a clean dispatch redeploys successfully.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # CI never runs a debugger; full DWARF only slows the link step and bloats
  # target/ (larger caches, slower restore/save). Line-tables keeps readable
  # test-failure backtraces and is compatible with llvm-cov (coverage uses the
  # instrumentation counters, not DWARF). Set at workflow level so main and
  # branches build with identical flags and their caches stay interchangeable.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

# Cancel superseded in-flight runs on the same ref, but only for pull requests.
# A push to main is never cancelled mid-way, so an in-progress docs deploy is
# never interrupted.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege by default: only the deploy-docs job needs pages/id-token
# write (granted at the job level below). Every other job reads at most.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Standard (non-instrumented) build profile, shared with the test and
          # smoke jobs. Swatinem folds the runner OS/arch into the key, so one
          # shared-key still splits cleanly across Linux and macOS.
          shared-key: std
          # Only main writes caches; branches/PRs restore from main (cross-branch
          # reads from the default branch are allowed) and never save. Stops
          # per-branch cache churn from evicting the warm main caches.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: std
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install tmux (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: Run tests
        run: cargo test

  # Coverage runs once, on Linux, with the instrumented build profile. The
  # coverage percentage is OS-independent for this Unix-only tool, so measuring
  # it on both runners was pure duplicated instrumentation cost. Kept in its own
  # `cov` cache so the instrumented artifacts never churn the standard-profile
  # `std` cache used by lint/test/smoke.
  coverage:
    name: Coverage (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cov
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov --json --output-path cov.json
          COVERAGE=$(python3 -c "import json; d=json.load(open('cov.json')); print(f\"{d['data'][0]['totals']['lines']['percent']:.1f}\")")
          echo "## Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          echo "[Full report](https://bearicorn.github.io/git-paw/coverage/)" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json, sys
          d = json.load(open('cov.json'))
          pct = d['data'][0]['totals']['lines']['percent']
          if pct < 80:
              print(f'Coverage {pct:.1f}% is below 80% threshold')
              sys.exit(1)
          print(f'Coverage {pct:.1f}% meets 80% threshold')
          "

  # Cold-start parity smoke: matches the local `just smoke` environment.
  # Forces a non-TTY, non-tmux baseline so missing `-x`/`-y` on a new
  # `tmux new-session` call site fails here BEFORE shipping to users.
  # See openspec/changes/cold-start-ci-parity for context.
  smoke-headless:
    name: Cold-start smoke (headless Linux)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TERM: dumb
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: std
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Run integration tests cold (no inherited TMUX, no live-session opt-out)
        run: |
          unset TMUX
          unset GIT_PAW_ALLOW_LIVE_SESSION
          cargo test --tests

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Run cargo audit
        run: cargo audit
      - name: Run cargo deny
        run: cargo deny check

  # Docs are built and deployed as two separate jobs (the canonical GitHub
  # Pages shape). Isolating the upload from the deploy means a deploy-only
  # flake — notably the upstream upload-pages-artifact retry-dup transient
  # (actions/upload-pages-artifact#97) — can be recovered by re-running the
  # deploy without rebuilding the book + coverage. It does NOT fix the
  # upstream retry-dup itself (that needs deploy-pages to accept an
  # artifact_id, tracked in actions/deploy-pages#338); the workflow_dispatch
  # fresh-run-id lever above stays the recovery path for that.
  build-docs:
    name: Build Docs
    needs: [lint, test, coverage, audit]
    if: >-
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          # Instrumented (llvm-cov) profile — same as the coverage job, so this
          # restores that warm cache instead of a cold compile.
          shared-key: cov
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: taiki-e/install-action@mdbook
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - name: Generate third-party licenses
        run: cargo about generate about.hbs -o docs/src/licenses.md
      - name: Build book
        run: mdbook build docs/
      - name: Generate coverage report
        run: cargo llvm-cov --html --output-dir docs/book/coverage
      # Emit the agent-friendly discovery surface (llms.txt, sitemap.xml,
      # robots.txt, per-page metadata) into docs/book so it deploys with the
      # Pages artifact. Runs after the book is built and before the upload; the
      # date is passed in as a build input, so the generator never reads the clock.
      - name: Generate agent-friendly docs surface
        run: python3 docs/generate_agent_metadata.py --src-dir docs/src --book-dir docs/book --build-date "$(date -u +%F)"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book

  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    runs-on: ubuntu-latest
    # Only this job touches Pages, so scope the write grants here rather than
    # at the workflow top level.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

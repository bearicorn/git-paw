name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger: re-run the pipeline (and the docs/Pages deploy) on demand
  # with a fresh run id. This is the recovery lever for the upstream
  # upload-pages-artifact retry-dup transient (actions/upload-pages-artifact#97),
  # where a finalize-timeout retry uploads a second `github-pages` artifact and
  # deploy-pages aborts with "Multiple artifacts named github-pages". A new run
  # id starts with zero artifacts, so a clean dispatch redeploys successfully.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install tmux (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov --json --output-path cov.json
          COVERAGE=$(python3 -c "import json; d=json.load(open('cov.json')); print(f\"{d['data'][0]['totals']['lines']['percent']:.1f}\")")
          echo "## Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          echo "[Full report](https://bearicorn.github.io/git-paw/coverage/)" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json, sys
          d = json.load(open('cov.json'))
          pct = d['data'][0]['totals']['lines']['percent']
          if pct < 80:
              print(f'Coverage {pct:.1f}% is below 80% threshold')
              sys.exit(1)
          print(f'Coverage {pct:.1f}% meets 80% threshold')
          "

  # Cold-start parity smoke: matches the local `just smoke` environment.
  # Forces a non-TTY, non-tmux baseline so missing `-x`/`-y` on a new
  # `tmux new-session` call site fails here BEFORE shipping to users.
  # See openspec/changes/cold-start-ci-parity for context.
  smoke-headless:
    name: Cold-start smoke (headless Linux)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TERM: dumb
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Run integration tests cold (no inherited TMUX, no live-session opt-out)
        run: |
          unset TMUX
          unset GIT_PAW_ALLOW_LIVE_SESSION
          cargo test --tests

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Run cargo audit
        run: cargo audit
      - name: Run cargo deny
        run: cargo deny check

  docs:
    name: Build & Deploy Docs
    needs: [lint, test, audit]
    if: >-
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: taiki-e/install-action@mdbook
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - name: Generate third-party licenses
        run: cargo about generate about.hbs -o docs/src/licenses.md
      - name: Build book
        run: mdbook build docs/
      - name: Generate coverage report
        run: cargo llvm-cov --html --output-dir docs/book/coverage
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
